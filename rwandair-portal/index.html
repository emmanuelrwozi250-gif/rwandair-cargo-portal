<!DOCTYPE html>
<html lang="en" data-portal="mgmt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RwandAir Cargo Intelligence Portal — GSA, Operations, Commercial & Management">
  <meta name="theme-color" content="#001632">
  <title>RwandAir Cargo Intelligence Portal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%2300529B'/><circle cx='16' cy='14' r='5.5' fill='%23FEE014'/><g stroke='%23FEE014' stroke-width='1.4' stroke-linecap='round'><line x1='16' y1='5' x2='16' y2='7'/><line x1='16' y1='21' x2='16' y2='23'/><line x1='7' y1='14' x2='9' y2='14'/><line x1='23' y1='14' x2='25' y2='14'/><line x1='9.7' y1='7.7' x2='11.1' y2='9.1'/><line x1='20.9' y1='18.9' x2='22.3' y2='20.3'/><line x1='22.3' y1='7.7' x2='20.9' y2='9.1'/><line x1='11.1' y1='18.9' x2='9.7' y2='20.3'/></g><path d='M5 22 Q10 17 16 16.5 Q22 17 27 22' fill='none' stroke='%2394C943' stroke-width='2' stroke-linecap='round'/><path d='M4 12 Q8 6 16 5 Q22 5.5 27 9' fill='none' stroke='%231EA2DC' stroke-width='2' stroke-linecap='round'/></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Official RwandAir typeface: Lato (Brand Guidelines v1) + JetBrains Mono for data/codes -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,700;1,900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/animations.css">

  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Critical inline styles (boot + legacy compat) -->
  <style>
    /* ── App shell hidden until ready ── */
    #topbar, #body-wrap { visibility: hidden; opacity: 0; transition: opacity 0.3s ease; }
    body.ready #topbar,
    body.ready #body-wrap { visibility: visible; opacity: 1; }

    /* ── Legacy helpers used by older pages ── */
    .kpi-unit     { font-size: 14px; font-weight: 500; color: var(--mid); }
    .chart-wrap   { position: relative; }
    .chart-wrap canvas { max-height: 100%; }
    .delta-up     { color: var(--green) !important; }
    .delta-down   { color: var(--red)   !important; }
    .kpi-alert    { border: 1px solid var(--red) !important; background: #FFF0EE !important; }

    /* Sidebar collapsed state (body class) */
    body.sidebar-collapsed #main-content { margin-left: var(--sidebar-collapsed-w) !important; }
    body.sidebar-collapsed #sidebar { width: var(--sidebar-collapsed-w) !important; }

    /* Map z-index fix */
    .leaflet-pane { z-index: 1; }
    .leaflet-top, .leaflet-bottom { z-index: 2; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       BOOT SCREEN — Shown during module loading
       ══════════════════════════════════════════════════════════ -->
  <div id="boot-screen" role="status" aria-label="Loading RwandAir Cargo Intelligence Portal">

    <!-- Floating plane decoration -->
    <div class="boot-plane">
      <svg width="280" height="280" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 2.5L13 6 4.8 4.2a.5.5 0 0 0-.5.3l-.9 2.6a1 1 0 0 0 .1.9l6.8 5.4-3.2 3.2-2.7-.9-1.2 1.2 2.5 2.5 2.5 2.5 1.2-1.2-.9-2.7 3.2-3.2 5.4 6.8a1 1 0 0 0 .9.1l2.6-.9a.5.5 0 0 0 .3-.5z"/>
      </svg>
    </div>

    <!-- Logo & wordmark -->
    <div class="boot-logo">
      <div class="boot-mark">
        <img src="/assets/rwandair-cargo-symbol.svg" alt="RwandAir Cargo" width="48" height="48" style="display:block">
      </div>
      <div class="boot-airline">
        <div class="boot-airline-name"><em style="font-style:italic;font-weight:700">RwandAir</em> <span style="color:var(--rw-gold);font-weight:900;font-style:italic;letter-spacing:.04em">CARGO</span></div>
        <div class="boot-airline-sub">Intelligence Portal</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="boot-progress-wrap">
      <div class="boot-progress-bar">
        <div class="boot-progress-fill" id="boot-fill"></div>
      </div>
      <div class="boot-status" id="boot-status">Initialising systems…</div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════════
       APP SHELL
       ══════════════════════════════════════════════════════════ -->

  <!-- Top Bar -->
  <header id="topbar" role="banner"></header>

  <!-- Body: Sidebar + Main Content -->
  <div id="body-wrap">
    <nav id="sidebar" aria-label="Portal navigation"></nav>
    <main id="main-content" role="main"></main>
  </div>

  <!-- ── Toast notifications ── -->
  <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

  <!-- ── Notification panel (right slide-in) ── -->
  <aside id="notif-panel" role="complementary" aria-label="Alerts and notifications"></aside>

  <!-- ── Command palette ── -->
  <div id="cmd-overlay" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmd-palette">
      <div class="cmd-search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--mid);flex-shrink:0">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="cmd-input" type="text" placeholder="Search pages, flights, AWBs, stations…" autocomplete="off" spellcheck="false">
        <span style="font-size:10px;color:var(--mid);background:var(--mist);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:var(--mono);white-space:nowrap">Esc</span>
      </div>
      <div id="cmd-results" class="cmd-results"></div>
      <div style="display:flex;align-items:center;gap:16px;padding:8px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--mid)">
        <span>↑↓ Navigate</span>
        <span>↵ Open</span>
        <span>Esc Close</span>
      </div>
    </div>
  </div>

  <!-- ── Booking / action modal ── -->
  <div id="modal-overlay" role="dialog" aria-modal="true">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       CDN Libraries (must load synchronously before app module)
       ══════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ══════════════════════════════════════════════════════════
       App Entry Point
       ══════════════════════════════════════════════════════════ -->
  <script type="module" src="src/app.js?v=4"></script>

  <!-- ══════════════════════════════════════════════════════════
       Boot screen orchestration
       ══════════════════════════════════════════════════════════ -->
  <script>
    // Apply stored portal theme immediately (supports ?portal=gsa|ops|mgmt deep links)
    (function() {
      const params = new URLSearchParams(window.location.search);
      const urlPortal = params.get('portal');
      const validPortals = ['gsa', 'ops', 'mgmt'];
      if (urlPortal && validPortals.includes(urlPortal)) {
        localStorage.setItem('rw_portal', urlPortal);
      }
      const portal = localStorage.getItem('rw_portal') || 'mgmt';
      document.documentElement.dataset.portal = portal;
      document.body.dataset.portal = portal;
    })();

    // Boot status messages
    const bootMessages = [
      'Connecting to cargo network…',
      'Loading flight schedules…',
      'Fetching revenue data…',
      'Preparing dashboards…',
      'All systems operational.',
    ];
    let msgIdx = 0;
    const statusEl = document.getElementById('boot-status');
    const msgInterval = setInterval(() => {
      if (statusEl && msgIdx < bootMessages.length) {
        statusEl.textContent = bootMessages[msgIdx++];
      } else {
        clearInterval(msgInterval);
      }
    }, 400);

    // Dismiss boot screen
    function dismissBoot() {
      const boot = document.getElementById('boot-screen');
      if (!boot || boot._dismissed) return;
      boot._dismissed = true;
      clearInterval(msgInterval);
      if (statusEl) statusEl.textContent = 'All systems operational.';
      setTimeout(() => {
        boot.style.opacity = '0';
        boot.style.transition = 'opacity 0.45s ease';
        document.body.classList.add('ready');
        setTimeout(() => boot.remove(), 500);
      }, 300);
    }

    // Primary: dismiss on load + 800ms
    window.addEventListener('load', () => setTimeout(dismissBoot, 800));
    // Fallback: dismiss after 4s regardless
    setTimeout(dismissBoot, 4000);
  </script>

</body>
</html>
